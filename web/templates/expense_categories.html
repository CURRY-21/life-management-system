{% extends "base.html" %}

{% block title %}类别管理{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">类别管理</h1>
    
    <!-- 添加类别表单 -->
    <div class="card mb-4">
        <div class="card-body">
            <h4 class="card-title">添加自定义类别</h4>
            <form method="post" action="{{ url_for('add_expense_category') }}">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="category_name">类别名称</label>
                        <input type="text" class="form-control" id="category_name" name="category_name" placeholder="请输入类别名称">
                    </div>
                    <div class="form-group col-md-6">
                        <label for="description">描述</label>
                        <input type="text" class="form-control" id="description" name="description" placeholder="请输入类别描述">
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">添加类别</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- 类别列表 -->
    <div class="card">
        <div class="card-body">
            <h4 class="card-title mb-4">类别列表</h4>
            {% if categories %}
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>类别名称</th>
                            <th>描述</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for category in categories %}
                        <tr>
                            <td>{{ category.category_name }}</td>
                            <td>{{ category.description }}</td>
                            <td>
                                <form method="post" action="{{ url_for('delete_expense_category', category_id=category.category_id) }}" onsubmit="return confirm('确定要删除这个类别吗？删除后将无法恢复。')">
                                    <button type="submit" class="btn btn-danger btn-sm">删除</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            {% else %}
            <p class="text-center text-muted">暂无类别</p>
            {% endif %}
        </div>
    </div>
    
    <!-- 返回按钮 -->
    <div class="mt-4">
        <a href="{{ url_for('expenses') }}" class="btn btn-secondary">返回花销记录</a>
    </div>
</div>
{% endblock %}
